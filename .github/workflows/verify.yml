name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Run paper-claim verifier
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run verify_claims.py
        run: |
          python3 scripts/dark_subspace/verify_claims.py | tee /tmp/verify.log
          # The verifier's last line is the summary; assert N/N pass + 0 fail.
          tail -n 5 /tmp/verify.log | grep -E "[0-9]+/[0-9]+ pass, 0 fail" \
            || (echo "verifier did not report N/N pass, 0 fail" && exit 1)

      - name: Run integration tests
        run: |
          python3 -m pip install --quiet pytest
          python3 -m pytest tests/ -q --no-header --tb=short
